<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc bạn ngủ ngoan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: radial-gradient(ellipse at center, #0a1628 0%, #020510 60%, #000308 100%);
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    cursor: default;
  }

  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .center {
    position: relative;
    z-index: 10;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .message {
    font-size: clamp(1.7rem, 5.2vw, 3.1rem);
    font-weight: 700;
    color: #f0e6ff;
    text-shadow:
      0 0 16px rgba(180, 120, 255, 0.7),
      0 0 32px rgba(120, 80, 200, 0.4);
    letter-spacing: 0.06em;
    line-height: 1.35;
    animation: breathe 4s ease-in-out infinite;
    user-select: none;
    cursor: pointer;
    padding: 12px 24px;
    border-radius: 16px;
    transition: transform 0.15s ease, text-shadow 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .message:hover {
    text-shadow:
      0 0 22px rgba(200, 140, 255, 0.95),
      0 0 44px rgba(140, 90, 220, 0.55),
      0 0 80px rgba(80, 40, 160, 0.35);
  }

  .message.active {
    transform: scale(0.96);
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.92; }
    50% { opacity: 1; }
  }

  #combo-bar-wrap {
    width: 160px;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #combo-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #7b5fd4, #d97bf7);
    border-radius: 4px;
    transition: width 0.15s ease;
  }

  #combo-bar-wrap.visible { opacity: 1; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="center">
  <div class="message" id="btn">✨ Chúc bạn ngủ ngoan ✨</div>
  <div id="combo-bar-wrap">
    <div id="combo-bar"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const btn = document.getElementById('btn');
const comboBarWrap = document.getElementById('combo-bar-wrap');
const comboBar = document.getElementById('combo-bar');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Stars ---
const NUM_STARS = 200;
const stars = [];

function randBetween(a, b) { return a + Math.random() * (b - a); }

for (let i = 0; i < NUM_STARS; i++) {
  stars.push({
    x: Math.random(),
    y: Math.random(),
    r: randBetween(0.4, 2.8),
    baseAlpha: randBetween(0.3, 1.0),
    alpha: 0,
    phase: Math.random() * Math.PI * 2,
    speed: randBetween(0.4, 1.4),
    color: pickStarColor(),
  });
}

function pickStarColor() {
  const palette = ['255,255,255','220,200,255','180,210,255','255,220,180','200,240,255'];
  return palette[Math.floor(Math.random() * palette.length)];
}

// --- Combo & speed multiplier ---
let comboCount = 0;
let lastClickTime = 0;
let comboTimeout = null;
let speedMult = 1;
let speedDecay = null;

const COMBO_THRESHOLD = 10;
const COMBO_WINDOW = 600; // ms between clicks to count

function resetCombo() {
  comboCount = 0;
  speedMult = 1;
  updateComboBar();
  comboBarWrap.classList.remove('visible');
}

function updateComboBar() {
  const pct = Math.min(comboCount / COMBO_THRESHOLD, 1) * 100;
  comboBar.style.width = pct + '%';
}

btn.addEventListener('mousedown', handleClick);
btn.addEventListener('touchstart', e => { e.preventDefault(); handleClick(); }, { passive: false });

function handleClick() {
  btn.classList.add('active');
  setTimeout(() => btn.classList.remove('active'), 120);

  const now = Date.now();
  if (now - lastClickTime < COMBO_WINDOW) {
    comboCount = Math.min(comboCount + 1, COMBO_THRESHOLD);
  } else {
    comboCount = 1;
  }
  lastClickTime = now;

  speedMult = 1 + (comboCount / COMBO_THRESHOLD) * 5;

  comboBarWrap.classList.add('visible');
  updateComboBar();

  if (comboCount >= COMBO_THRESHOLD) {
    triggerBurst();
    comboCount = 0;
    updateComboBar();
    speedMult = 1;
    setTimeout(() => comboBarWrap.classList.remove('visible'), 600);
  }

  clearTimeout(comboTimeout);
  comboTimeout = setTimeout(resetCombo, COMBO_WINDOW * 2);
}

// --- Burst particles ---
const particles = [];

function triggerBurst() {
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const count = 60 + Math.floor(Math.random() * 30);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = randBetween(2, 11);
    const size = randBetween(1, 3.5);
    const col = pickStarColor();
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - randBetween(0, 3),
      r: size,
      alpha: 1,
      color: col,
      life: randBetween(60, 120),
      maxLife: 0,
      gravity: randBetween(0.04, 0.12),
      twinkle: Math.random() < 0.4,
    });
    particles[particles.length - 1].maxLife = particles[particles.length - 1].life;
  }
}

// --- Draw ---
let t = 0;
let lastFrame = performance.now();
let smoothSpeed = 1;
function draw(now) {
  if (!now) now = performance.now();
  const dt = Math.min((now - lastFrame) / 1000, 0.05);
  lastFrame = now;

  ctx.clearRect(0, 0, W, H);

  // Smooth speed multiplier toward target
  smoothSpeed += (speedMult - smoothSpeed) * Math.min(dt * 4, 1);
  const sm = smoothSpeed;
  t += dt * sm;

  // Background stars
  for (const s of stars) {
    s.alpha = s.baseAlpha * (0.5 + 0.5 * Math.sin(s.phase + t * s.speed));
    const px = s.x * W;
    const py = s.y * H;

    ctx.beginPath();
    ctx.arc(px, py, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${s.color},${s.alpha})`;
    ctx.fill();

    // Glow on brighter stars
    if (s.r > 1.6 && s.alpha > 0.6) {
      ctx.beginPath();
      const g = ctx.createRadialGradient(px, py, 0, px, py, s.r * 5);
      g.addColorStop(0, `rgba(${s.color},${s.alpha * 0.4})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.arc(px, py, s.r * 5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Burst particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.life--;
    p.alpha = p.life / p.maxLife;
    if (p.twinkle) p.alpha *= 0.6 + 0.4 * Math.sin(t * 20 + i);

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.alpha, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
    ctx.fill();

    // Trail glow
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
    g.addColorStop(0, `rgba(${p.color},${p.alpha * 0.5})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();

    if (p.life <= 0) particles.splice(i, 1);
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
